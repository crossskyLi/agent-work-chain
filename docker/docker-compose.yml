version: '3.8'

services:
  indexer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - BASE_SEPOLIA_RPC_URL=${BASE_SEPOLIA_RPC_URL:-https://sepolia.base.org}
      - TRUSTCHAIN_ADDRESS=${TRUSTCHAIN_ADDRESS}
      - DB_PATH=/data/indexer.db
    volumes:
      - indexer-data:/data
    restart: unless-stopped

volumes:
  indexer-data:
